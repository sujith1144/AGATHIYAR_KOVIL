<!DOCTYPE html>
<html>
<head>
    <title>Zyrex Smart Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --on: #22c55e; --off: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        
        /* HEADER & PING THING */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .ping-box { display: flex; align-items: center; gap: 8px; font-size: 14px; background: rgba(255,255,255,0.05); padding: 6px 15px; border-radius: 20px; border: 1px solid #334155; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #64748b; box-shadow: 0 0 5px #64748b; transition: 0.3s; }
        .dot.online { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .dot.offline { background: #ef4444; box-shadow: 0 0 10px #ef4444; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #334155; }
        .status { font-weight: bold; margin: 10px 0; font-size: 1.3rem; cursor: pointer; }
        
        /* TIMER DISPLAY LOGIC */
        .timer-container { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid #334155; }
        .timer-label { font-size: 10px; color: #94a3b8; text-align: left; }
        .set-btn { background: #3b82f6; border: none; color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }

        .master-controls { margin-top: 30px; display: flex; gap: 10px; }
        .master-btn { flex: 1; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>Zyrex 🕍</h1>
    <div class="ping-box">
        <div id="pingDot" class="dot"></div>
        <span id="pingStatus">Connecting...</span>
    </div>
</header>

<div class="grid" id="mainGrid">
    </div>

<div class="master-controls">
    <button class="master-btn" style="background: var(--on)" onclick="masterCmd('allon')">TEMPLE ALL ON</button>
    <button class="master-btn" style="background: var(--off)" onclick="masterCmd('alloff')">TEMPLE ALL OFF</button>
</div>

<script>
    const names = ["Om", "Melam-1", "Melam-2", "Agathiyar", "Vinayakar", "Navakiragam", "Source-1", "Source-2"];
    const topic_cmd = "myhome/kirupakaran/relay/cmd";
    const topic_status = "myhome/kirupakaran/relay/status";
    const topic_sched = "myhome/kirupakaran/relay/sched_info";

    let client = new Paho.MQTT.Client("broker.emqx.io", 8084, "web_" + Math.random());

    function buildUI() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        // Note the order: 1, 4, 5, 6 first (Temple), then the others
        const order = [1, 4, 5, 6, 2, 3, 7, 8];
        order.forEach(ch => {
            const name = names[ch-1];
            grid.innerHTML += `
                <div class="card">
                    <h3 style="margin:0; font-size: 14px; color: #94a3b8;">${name}</h3>
                    <div id="st${ch}" class="status" onclick="sendToggle(${ch})">OFF</div>
                    <div class="timer-container">
                        <div class="timer-label" id="timer-text-${ch}">No Timer</div>
                        <button class="set-btn" onclick="setTimerPrompt(${ch})">SET</button>
                    </div>
                </div>
            `;
        });
    }

    client.onConnectionLost = () => {
        document.getElementById('pingDot').className = "dot offline";
        document.getElementById('pingStatus').innerText = "Offline";
    };

    client.onMessageArrived = (msg) => {
        const data = JSON.parse(msg.payloadString);
        
        if (msg.destinationName === topic_status) {
            data.states.forEach((s, i) => {
                const el = document.getElementById(`st${i+1}`);
                if(el) {
                    el.innerText = s ? "ON" : "OFF";
                    el.style.color = s ? "var(--on)" : "var(--off)";
                }
            });
        } 
        else if (msg.destinationName === topic_sched) {
            // Reset all labels first
            for(let i=1; i<=8; i++) document.getElementById(`timer-text-${i}`).innerText = "No Timer";
            // Update labels with active schedules
            data.forEach(item => {
                const textEl = document.getElementById(`timer-text-${item.ch}`);
                if(textEl) textEl.innerText = `${item.time} (${item.state?'ON':'OFF'})`;
            });
        }
    };

    client.connect({ onSuccess: () => {
        document.getElementById('pingDot').className = "dot online";
        document.getElementById('pingStatus').innerText = "Online";
        client.subscribe(topic_status);
        client.subscribe(topic_sched);
        client.send(topic_cmd, JSON.stringify({cmd: "request_status"}));
    }, useSSL: true });

    function sendToggle(ch) { client.send(topic_cmd, JSON.stringify({cmd: "toggle", ch: ch})); }
    function masterCmd(c) { client.send(topic_cmd, JSON.stringify({cmd: c})); }

    function setTimerPrompt(ch) {
        const t = prompt("Set time (HH:MM 24hr):", "18:00");
        if(!t) return;
        const s = confirm("Switch ON at this time? (OK for ON, Cancel for OFF)") ? 1 : 0;
        const msg = JSON.stringify({
            cmd: "schedule", ch: ch, hour: parseInt(t.split(':')[0]), 
            minute: parseInt(t.split(':')[1]), state: s, days: [0,1,2,3,4,5,6]
        });
        client.send(topic_cmd, msg);
    }

    buildUI();
</script>
</body>
</html>
