<!DOCTYPE html>
<html lang="en">
<head>
    <title>AGATHIYAR KOVIL CONTROL V8</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root { --bg: #010409; --panel: #0d1117; --border: #30363d; --text: #c9d1d9; --green: #238636; --red: #da3633; --blue: #1f6feb; --gold: #f2cc60; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 25px; }
        
        #loginGate { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-card { background: var(--panel); padding: 50px; border-radius: 20px; border: 1px solid var(--border); width: 380px; text-align: center; }
        input, select { width: 100%; padding: 16px; margin: 15px 0; border-radius: 12px; border: 1px solid var(--border); background: #010409; color: white; font-size: 16px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 16px; background: var(--green); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 900; }

        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 30px; margin-bottom: 40px; }
        .speed-box { text-align: right; }
        .pill { font-size: 12px; font-weight: 900; padding: 10px 20px; border-radius: 10px; text-transform: uppercase; letter-spacing: 2px; border: 1px solid var(--border); }
        .speed-val { color: var(--gold); font-family: monospace; font-size: 14px; margin-top: 10px; display: block; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 35px; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 25px; padding: 40px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: var(--blue); box-shadow: 0 0 20px rgba(31, 111, 235, 0.2); }
        
        /* INCREASED APPLIANCE NAME FONT SIZE */
        .app-name { font-size: 20px; color: #8b949e; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; }
        .relay-val { font-size: 56px; font-weight: 900; margin: 35px 0; cursor: pointer; transition: 0.2s; }
        
        .timer-footer { border-top: 1px solid var(--border); margin-top: 35px; padding-top: 30px; display: flex; align-items: center; justify-content: space-between; }
        .timer-info { font-size: 13px; color: #8b949e; text-align: left; font-family: monospace; font-weight: bold; }
        .btn-set-timer { background: var(--blue); color: white; border: none; padding: 14px 20px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold; }

        .master-controls { margin-top: 60px; display: flex; gap: 30px; }
        .btn-master { flex: 1; padding: 28px; border: none; border-radius: 18px; color: white; font-weight: 900; cursor: pointer; font-size: 20px; text-transform: uppercase; }

        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="loginGate">
    <div class="login-card">
        <h2 style="color:white; letter-spacing: 4px;">AGATHIYAR SECURITY</h2>
        <input type="password" id="pBox" placeholder="Enter System Password">
        <button class="btn-action" onclick="login()">AUTHORIZE ACCESS</button>
    </div>
</div>

<header>
    <div>
        <h1 style="margin:0; font-size: 36px; color: white; letter-spacing: 3px;">AGATHIYAR KOVIL</h1>
        <p style="margin:0; font-size: 14px; color: #8b949e; font-weight: 900; text-transform: uppercase;">Hardware Control Matrix</p>
    </div>
    <div class="speed-box">
        <div id="espStatus" class="pill" style="color:#f85149">OFFLINE</div>
        <span id="speedVal" class="speed-val">NETWORK: 0.00 KB/s</span>
    </div>
</header>

<div class="grid" id="uiGrid"></div>

<div class="master-controls">
    <button class="btn-master" style="background: var(--green)" onclick="mCmd('allon')">TEMPLE ACTIVE</button>
    <button class="btn-master" style="background: var(--red)" onclick="mCmd('alloff')">TEMPLE INACTIVE</button>
</div>

<div id="modal">
    <div class="login-card">
        <h3 style="color:white; margin-top:0;">Weekly Scheduler</h3>
        <p id="targetName" style="font-size:16px; color:var(--gold); margin-bottom:25px; font-weight:bold;"></p>
        <select id="dayInput">
            <option value="1">MONDAY</option>
            <option value="2">TUESDAY</option>
            <option value="3">WEDNESDAY</option>
            <option value="4">THURSDAY</option>
            <option value="5">FRIDAY</option>
            <option value="6">SATURDAY</option>
            <option value="0">SUNDAY</option>
        </select>
        <input type="time" id="timeInput">
        <select id="stInput">
            <option value="1">ACTION: TURN ON</option>
            <option value="0">ACTION: TURN OFF</option>
        </select>
        <button class="btn-action" onclick="saveTimer()">DEPLOY TO ESP32</button>
        <button class="btn-action" style="background:#30363d; margin-top:10px;" onclick="closeM()">CANCEL</button>
    </div>
</div>

<script>
    const rNames = ["Om", "Melam-1", "Melam-2", "Agathiyar", "Vinayakar", "Navakiragam", "Source-1", "Source-2"];
    let selCh = 0;
    let lastHeartbeat = 0;
    
    function login() {
        if(document.getElementById('pBox').value === "Agathiyar") {
            document.getElementById('loginGate').style.display = "none";
        } else { alert("Access Denied"); }
    }

    let mqtt = new Paho.MQTT.Client("broker.emqx.io", 8084, "kovil_v8_" + Math.random());

    function build() {
        const grid = document.getElementById('uiGrid');
        grid.innerHTML = "";
        [1, 4, 5, 6, 2, 3, 7, 8].forEach(ch => {
            grid.innerHTML += `
                <div class="card">
                    <div class="app-name">${rNames[ch-1]}</div>
                    <div id="st-${ch}" class="relay-val" onclick="tgl(${ch})" style="color:#f85149">OFF</div>
                    <div class="timer-footer">
                        <div class="timer-info" id="inf-${ch}">NO TASK</div>
                        <button class="btn-set-timer" onclick="showM(${ch})">SET DAY</button>
                    </div>
                </div>
            `;
        });
    }

    // NETWORK SPEED SIMULATOR (MB/s / KB/s)
    setInterval(() => {
        const statusEl = document.getElementById('espStatus');
        const speedEl = document.getElementById('speedVal');
        if (Date.now() - lastHeartbeat > 10000) {
            statusEl.innerText = "OFFLINE"; statusEl.style.color = "#f85149";
            speedEl.innerText = "NETWORK: 0.00 KB/s";
        } else {
            statusEl.innerText = "ONLINE"; statusEl.style.color = "#3fb950";
            let val = (Math.random() * 1.5).toFixed(2);
            speedEl.innerText = `NETWORK: ${val} MB/s`;
        }
    }, 2000);

    mqtt.onMessageArrived = (msg) => {
        const d = JSON.parse(msg.payloadString);
        if (msg.destinationName.includes("heartbeat")) { lastHeartbeat = Date.now(); }
        else if (msg.destinationName.includes("status")) {
            d.states.forEach((s, i) => {
                const el = document.getElementById(`st-${i+1}`);
                if(el) { el.innerText = s ? "ON" : "OFF"; el.style.color = s ? "#3fb950" : "#f85149"; }
            });
        }
        else if (msg.destinationName.includes("sched_info")) {
            for(let i=1; i<=8; i++) document.getElementById(`inf-${i}`).innerHTML = "NO TASK";
            d.forEach(item => {
                const l = document.getElementById(`inf-${item.ch}`);
                if(l) l.innerHTML = item.time + "<br>(" + (item.state?'ON':'OFF') + ")";
            });
        }
    };

    mqtt.connect({ onSuccess: () => {
        mqtt.subscribe("myhome/kirupakaran/relay/#");
        mqtt.send("myhome/kirupakaran/relay/cmd", JSON.stringify({cmd: "request_status"}));
    }, useSSL: true });

    function tgl(ch) { mqtt.send("myhome/kirupakaran/relay/cmd", JSON.stringify({cmd:"toggle", ch:ch})); }
    function mCmd(c) { mqtt.send("myhome/kirupakaran/relay/cmd", JSON.stringify({cmd:c})); }
    function showM(ch) { selCh = ch; document.getElementById('targetName').innerText = rNames[ch-1]; document.getElementById('modal').style.display = 'flex'; }
    function closeM() { document.getElementById('modal').style.display = 'none'; }
    
    function saveTimer() {
        const timeVal = document.getElementById('timeInput').value;
        if(!timeVal) return alert("Select Time");
        const parts = timeVal.split(':');
        mqtt.send("myhome/kirupakaran/relay/cmd", JSON.stringify({
            cmd: "schedule", ch: selCh, 
            day: parseInt(document.getElementById('dayInput').value),
            hour: parseInt(parts[0]), minute: parseInt(parts[1]),
            state: parseInt(document.getElementById('stInput').value)
        }));
        closeM();
    }
    build();
</script>
</body>
</html>
