<!DOCTYPE html>
<html>
<head>
    <title>AGATHIYAR KOVIL CONTROL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root { --bg: #0b0e14; --panel: #161b22; --accent: #238636; --text: #c9d1d9; --red: #f85149; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* LOGIN PAGE */
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 10px; border: 1px solid #30363d; width: 300px; text-align: center; }
        input[type="password"], input[type="datetime-local"] { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* HEADER & CONNECTIVITY */
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 15px; margin-bottom: 20px; }
        .ping-indicator { font-size: 12px; font-weight: bold; padding: 5px 12px; border-radius: 20px; }
        .status-online { color: #3fb950; border: 1px solid #3fb950; background: rgba(63, 185, 80, 0.1); }
        .status-offline { color: #f85149; border: 1px solid #f85149; background: rgba(248, 81, 73, 0.1); }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .card { background: var(--panel); border: 1px solid #30363d; border-radius: 10px; padding: 20px; text-align: center; }
        .relay-status { font-size: 32px; font-weight: bold; margin: 15px 0; cursor: pointer; }
        
        /* TIMER UI */
        .timer-zone { border-top: 1px solid #30363d; margin-top: 15px; padding-top: 15px; display: flex; align-items: center; justify-content: space-between; }
        .timer-display { font-size: 10px; color: #8b949e; text-align: left; line-height: 1.3; }
        .set-btn { background: #1f6feb; border: none; color: white; padding: 6px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; }

        .master-bar { margin-top: 30px; display: flex; gap: 10px; }
        .master-btn { flex: 1; padding: 18px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 15px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="margin-top:0">🔐 SECURE LOGIN</h2>
        <input type="password" id="passInput" placeholder="Enter Password">
        <button class="login-btn" onclick="checkPass()">ENTER SYSTEM</button>
    </div>
</div>

<header>
    <h2 style="margin:0; font-size: 18px;">AGATHIYAR KOVIL CONTROL 🕍</h2>
    <div id="pinger" class="ping-indicator status-offline">NOT CONNECTED</div>
</header>

<div class="grid" id="mainGrid"></div>

<div class="master-bar">
    <button class="master-btn" style="background: var(--accent)" onclick="master('allon')">TEMPLE ALL ON</button>
    <button class="master-btn" style="background: var(--red)" onclick="master('alloff')">TEMPLE ALL OFF</button>
</div>

<div id="timerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;">
    <div class="login-box">
        <h3>Schedule Device</h3>
        <input type="datetime-local" id="dtPicker">
        <select id="stateSelect" style="width:100%; padding:10px; margin-bottom:10px; background:#0d1117; color:white; border-radius:6px; border:1px solid #30363d;">
            <option value="1">Turn ON</option>
            <option value="0">Turn OFF</option>
        </select>
        <button class="login-btn" onclick="confirmTimer()">SET SCHEDULE</button>
        <button class="login-btn" style="background:#30363d; margin-top:5px;" onclick="closeModal()">CANCEL</button>
    </div>
</div>

<script>
    const names = ["Om", "Melam-1", "Melam-2", "Agathiyar", "Vinayakar", "Navakiragam", "Source-1", "Source-2"];
    let activeCh = 0;
    
    function checkPass() {
        if(document.getElementById('passInput').value === "Agathiyar") {
            document.getElementById('loginOverlay').style.display = "none";
        } else {
            alert("Incorrect Password!");
        }
    }

    let client = new Paho.MQTT.Client("broker.emqx.io", 8084, "kovil_web_" + Math.random());

    function build() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        [1, 4, 5, 6, 2, 3, 7, 8].forEach(ch => {
            grid.innerHTML += `
                <div class="card">
                    <div style="font-size: 11px; color: #8b949e; letter-spacing: 1px;">${names[ch-1].toUpperCase()}</div>
                    <div id="st-${ch}" class="relay-status" onclick="toggle(${ch})">OFF</div>
                    <div class="timer-zone">
                        <div class="timer-display" id="lbl-${ch}">No Timer<br>Configured</div>
                        <button class="set-btn" onclick="openModal(${ch})">SET TIMER</button>
                    </div>
                </div>
            `;
        });
    }

    client.onConnectionLost = () => {
        const p = document.getElementById('pinger');
        p.innerText = "NOT CONNECTED";
        p.className = "ping-indicator status-offline";
    };

    client.onMessageArrived = (msg) => {
        const data = JSON.parse(msg.payloadString);
        if (msg.destinationName === "myhome/kirupakaran/relay/status") {
            data.states.forEach((s, i) => {
                const el = document.getElementById(`st-${i+1}`);
                if(el) {
                    el.innerText = s ? "ON" : "OFF";
                    el.style.color = s ? "#3fb950" : "#f85149";
                }
            });
        } else if (msg.destinationName === "myhome/kirupakaran/relay/sched_info") {
            for(let i=1; i<=8; i++) document.getElementById(`lbl-${i}`).innerText = "No Timer\nConfigured";
            data.forEach(item => {
                const lbl = document.getElementById(`lbl-${item.ch}`);
                if(lbl) lbl.innerText = item.time + "\n(" + (item.state?'ON':'OFF') + ")";
            });
        }
    };

    client.connect({ onSuccess: () => {
        const p = document.getElementById('pinger');
        p.innerText = "CONNECTED";
        p.className = "ping-indicator status-online";
        client.subscribe("myhome/kirupakaran/relay/status");
        client.subscribe("myhome/kirupakaran/relay/sched_info");
        client.send("myhome/kirupakaran/relay/cmd", JSON.stringify({cmd: "request_status"}));
    }, useSSL: true });

    function toggle(ch) { client.send("myhome/kirupakaran/relay/cmd", JSON.stringify({cmd:"toggle", ch:ch})); }
    function master(c) { client.send("myhome/kirupakaran/relay/cmd", JSON.stringify({cmd:c})); }
    
    function openModal(ch) { activeCh = ch; document.getElementById('timerModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('timerModal').style.display = 'none'; }
    
    function confirmTimer() {
        const dt = document.getElementById('dtPicker').value; // Returns YYYY-MM-DDTHH:MM
        if(!dt) return alert("Select Date & Time");
        const dateObj = new Date(dt);
        const msg = JSON.stringify({
            cmd: "schedule", ch: activeCh, 
            day: dateObj.getDate(), month: dateObj.getMonth() + 1,
            hour: dateObj.getHours(), minute: dateObj.getMinutes(),
            state: parseInt(document.getElementById('stateSelect').value)
        });
        client.send("myhome/kirupakaran/relay/cmd", msg);
        closeModal();
    }

    build();
</script>
</body>
</html>
