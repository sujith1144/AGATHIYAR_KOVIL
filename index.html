<!DOCTYPE html>
<html>
<head>
  <title>Agathiyar Control</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #222;
      padding: 20px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
    }

    .on { background: green; }
    .off { background: red; }
  </style>
</head>

<body>

<h2>Agathiyar Kovil Dashboard</h2>

<div class="grid" id="grid"></div>

<button onclick="allOn()">ALL ON</button>
<button onclick="allOff()">ALL OFF</button>

<script>
const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

const relays = [
  "Main Light","Fan","Outer Light","Temple Inside",
  "Audio System","Motor","Spare 1","Spare 2"
];

const state = {};
const timers = {};

function createUI() {
  const grid = document.getElementById("grid");

  relays.forEach((name, i) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${name}</h3>
      <button id="btn${i}" onclick="toggle(${i})">OFF</button>
      <p id="timer${i}">Manual Mode</p>
    `;

    grid.appendChild(card);
  });
}

function toggle(i) {
  const newState = state[i] === "ON" ? "OFF" : "ON";

  client.publish(`cmnd/agathiyar/relay/${i+1}`, newState);
}

function allOn() {
  client.publish("cmnd/agathiyar/all", "ON");
}

function allOff() {
  client.publish("cmnd/agathiyar/all", "OFF");
}

client.on('connect', () => {
  console.log("Connected");

  for (let i = 1; i <= 8; i++) {
    client.subscribe(`stat/agathiyar/relay/${i}`);
    client.subscribe(`stat/agathiyar/relay/${i}/timer`);
  }
});

client.on('message', (topic, message) => {
  const msg = message.toString();

  for (let i = 0; i < 8; i++) {
    if (topic === `stat/agathiyar/relay/${i+1}`) {
      state[i] = msg;

      const btn = document.getElementById(`btn${i}`);
      btn.innerText = msg;
      btn.className = msg === "ON" ? "on" : "off";
    }

    if (topic === `stat/agathiyar/relay/${i+1}/timer`) {
      document.getElementById(`timer${i}`).innerText = msg;
    }
  }
});

createUI();
</script>

</body>
</html>
