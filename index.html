<!DOCTYPE html>
<html>
<head>
    <title>Zyrex Home Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --on: #10b981; --off: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #f1f5f9; margin: 0; padding: 20px; }
        
        /* PING / CONNECTIVITY INDICATOR */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .conn-box { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: bold; transition: 0.5s; border: 1px solid transparent; }
        .online { color: #10b981; border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .offline { color: #ef4444; border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #334155; text-align: center; }
        .status-display { font-size: 28px; font-weight: 800; margin: 15px 0; cursor: pointer; }
        
        /* TIMER ROW */
        .timer-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid #334155; padding-top: 15px; }
        .timer-text { font-size: 11px; color: #94a3b8; text-align: left; line-height: 1.2; }
        .btn-set { background: #3b82f6; color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }

        .bottom-bar { margin-top: 40px; display: flex; gap: 10px; }
        .btn-master { flex: 1; padding: 18px; border: none; border-radius: 12px; font-weight: 900; color: white; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0">Zyrex 🕍</h1>
    <div id="connStatus" class="conn-box offline">NOT CONNECTED</div>
</header>

<div class="grid" id="appGrid">
    </div>

<div class="bottom-bar">
    <button class="btn-master" style="background: var(--on)" onclick="master('allon')">TEMPLE ALL ON</button>
    <button class="btn-master" style="background: var(--off)" onclick="master('alloff')">TEMPLE ALL OFF</button>
</div>

<script>
    const relayNames = ["Om", "Melam-1", "Melam-2", "Agathiyar", "Vinayakar", "Navakiragam", "Source-1", "Source-2"];
    const topic_cmd = "myhome/kirupakaran/relay/cmd";
    const topic_status = "myhome/kirupakaran/relay/status";
    const topic_sched = "myhome/kirupakaran/relay/sched_info";

    let mqtt = new Paho.MQTT.Client("broker.emqx.io", 8084, "zyrex_web_" + Math.random());

    function createUI() {
        const grid = document.getElementById('appGrid');
        grid.innerHTML = "";
        // Displaying in logical order: Temple first
        [1, 4, 5, 6, 2, 3, 7, 8].forEach(ch => {
            grid.innerHTML += `
                <div class="card">
                    <div style="font-size: 12px; color: #64748b; font-weight: bold;">${relayNames[ch-1].toUpperCase()}</div>
                    <div id="val-${ch}" class="status-display" onclick="toggle(${ch})">OFF</div>
                    <div class="timer-row">
                        <div class="timer-text" id="label-ch-${ch}">No Timer<br>Set</div>
                        <button class="btn-set" onclick="openTimer(${ch})">SET TIMER</button>
                    </div>
                </div>
            `;
        });
    }

    mqtt.onConnectionLost = () => {
        const indicator = document.getElementById('connStatus');
        indicator.innerText = "NOT CONNECTED";
        indicator.className = "conn-box offline";
    };

    mqtt.onMessageArrived = (msg) => {
        const data = JSON.parse(msg.payloadString);
        if (msg.destinationName === topic_status) {
            data.states.forEach((s, i) => {
                const el = document.getElementById(`val-${i+1}`);
                if(el) {
                    el.innerText = s ? "ON" : "OFF";
                    el.style.color = s ? "var(--on)" : "var(--off)";
                }
            });
        } 
        else if (msg.destinationName === topic_sched) {
            // Reset labels first
            for(let i=1; i<=8; i++) document.getElementById(`label-ch-${i}`).innerText = "No Timer\nSet";
            // Map the active schedules to the UI
            data.forEach(item => {
                const lbl = document.getElementById(`label-ch-${item.ch}`);
                if(lbl) lbl.innerText = `${item.time}\n(${item.state?'ON':'OFF'})`;
            });
        }
    };

    mqtt.connect({ onSuccess: () => {
        const indicator = document.getElementById('connStatus');
        indicator.innerText = "CONNECTED";
        indicator.className = "conn-box online";
        mqtt.subscribe(topic_status);
        mqtt.subscribe(topic_sched);
        mqtt.send(topic_cmd, JSON.stringify({cmd: "request_status"}));
    }, useSSL: true });

    function toggle(ch) { mqtt.send(topic_cmd, JSON.stringify({cmd: "toggle", ch: ch})); }
    function master(c) { mqtt.send(topic_cmd, JSON.stringify({cmd: c})); }
    
    function openTimer(ch) {
        const t = prompt("Schedule Time (24h format HH:MM):", "18:00");
        if(!t) return;
        const state = confirm("Should the device turn ON at this time?") ? 1 : 0;
        mqtt.send(topic_cmd, JSON.stringify({
            cmd: "schedule", ch: ch, hour: parseInt(t.split(':')[0]), 
            minute: parseInt(t.split(':')[1]), state: state, days: [0,1,2,3,4,5,6]
        }));
    }

    createUI();
</script>
</body>
</html>
